# ============================================================
# Assignment Guardian — 作业配置文件
# 格式说明:
#   [课程标识]        — 唯一标识名（英文，无空格）
#   ddl              — 截止时间 (YYYY-MM-DD HH:MM)
#   submit           — 提交方式: scp | git | local
#   target           — 提交目标路径
#   required_files   — 必交文件列表，逗号分隔，支持通配符
#   naming           — 打包命名格式
#   notes            — 补充说明（可选）
# ============================================================

