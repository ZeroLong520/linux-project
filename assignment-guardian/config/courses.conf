# ============================================================
# Assignment Guardian — 作业配置文件
# 格式说明:
#   [课程标签]         — 唯一标识名（英文，无空格）
#   ddl               — 截止时间 (YYYY-MM-DD HH:MM)
#   submit            — 提交方式: scp | git | local
#   target            — 提交目标路径
#   required_files    — 必交文件列表，逗号分隔，支持通配符
#   naming            — 打包命名格式
#   notes             — 补充说明（可选）
#   grading           — 评分标准，逗号分隔各项
#   format            — 格式要求
#   forbidden         — 禁止事项
# ============================================================

# ====== Linux系统管理与Shell编程 ======
[linux]
ddl = 2026-06-20 23:59
submit = scp
target = /home/2350801228/labs/lab7/
required_files = report.pdf, src/*.sh, README.md
naming = linux_学号_姓名.tar.gz
notes = 脚本文件命名: task1_xxx.sh, task2_xxx.sh; 变量名: 小写+下划线; 函数名: 小驼峰; 脚本必须有可执行权限; 报告不少于10页
grading = 功能完整性:40分, 代码规范:20分, 实验报告:25分, 创新与扩展:15分
format = Shebang(#!/bin/bash), UTF-8编码, 文件末尾必须有换行符
forbidden = 禁止使用root权限运行脚本, 禁止硬编码密码, 严禁抄袭(查重率>30%记0分)

